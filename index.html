<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segment Sampler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 36px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #a78bfa;
    }

    .panel {
      background: #161625;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .field label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      width: 100px;
      flex-shrink: 0;
    }

    input[type="file"] {
      flex: 1;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    input[type="number"] {
      width: 76px;
      padding: 7px 10px;
      background: #0d0d1a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 1rem;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124,58,237,.25);
    }

    .hint { font-size: 0.78rem; color: #475569; }

    #loadBtn {
      align-self: flex-end;
      padding: 10px 28px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .15s;
    }

    #loadBtn:hover:not(:disabled) { background: #6d28d9; }
    #loadBtn:disabled { background: #2d2d4e; color: #4b5563; cursor: not-allowed; }

    #status {
      font-size: 0.78rem;
      color: #475569;
      text-align: center;
      min-height: 16px;
    }

    /* Keyboard */
    #kb-wrap {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 12px;
    }

    #kb-center {
      display: flex;
      justify-content: center;
      min-width: max-content;
    }

    #piano {
      position: relative;
      display: inline-block;
    }

    .key {
      position: absolute;
      border-radius: 0 0 5px 5px;
      cursor: pointer;
      user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .wk {
      background: linear-gradient(to bottom, #e0e0e0, #fff 35%);
      border: 1px solid #999;
      border-top: none;
      z-index: 1;
    }

    .wk.active { background: linear-gradient(to bottom, #a78bfa, #ddd6fe); }

    .bk {
      background: linear-gradient(160deg, #2e2e2e 0%, #0a0a0a 65%);
      border: 1px solid #000;
      box-shadow: 2px 6px 10px rgba(0,0,0,.8), inset 0 -2px 3px rgba(255,255,255,.06);
      z-index: 2;
    }

    .bk.active {
      background: linear-gradient(160deg, #6d28d9 0%, #3b0764 65%);
      box-shadow: 1px 3px 6px rgba(0,0,0,.8);
    }

    #tip {
      font-size: 0.73rem;
      color: #334155;
      letter-spacing: .5px;
    }

    #adsr-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 28px;
    }

    .adsr-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .adsr-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .adsr-header label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
    }

    .slider-val {
      font-size: 0.78rem;
      font-family: monospace;
      color: #a78bfa;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #7c3aed;
      cursor: pointer;
      height: 4px;
    }

    .key-label {
      position: absolute;
      bottom: 6px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      font-family: monospace;
      line-height: 1.2;
      pointer-events: none;
      white-space: nowrap;
    }
    .wk .key-label { color: #888; }
    .bk .key-label { color: #666; font-size: 8px; bottom: 4px; }
  </style>
</head>
<body>

  <h1>Segment Sampler</h1>

  <div class="panel">
    <div class="field">
      <label>Audio file</label>
      <input type="file" id="fileInput" accept="audio/*">
    </div>
    <div class="field">
      <label>Segments</label>
      <input type="number" id="segInput" min="12" max="84" value="24" step="1">
      <span class="hint">keys &nbsp;(12 – 84)</span>
    </div>
    <button id="loadBtn" disabled>Load</button>
    <div id="status">Select an audio file to get started.</div>
  </div>

  <div class="panel" id="adsr-panel">
    <div class="adsr-field">
      <div class="adsr-header"><label>Attack</label><span class="slider-val" id="atkVal">0.01s</span></div>
      <input type="range" id="atkSlider" min="0" max="2" step="0.01" value="0.01">
    </div>
    <div class="adsr-field">
      <div class="adsr-header"><label>Decay</label><span class="slider-val" id="decVal">0.10s</span></div>
      <input type="range" id="decSlider" min="0" max="2" step="0.01" value="0.1">
    </div>
    <div class="adsr-field">
      <div class="adsr-header"><label>Sustain</label><span class="slider-val" id="susVal">0.80</span></div>
      <input type="range" id="susSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
    <div class="adsr-field">
      <div class="adsr-header"><label>Release</label><span class="slider-val" id="relVal">0.30s</span></div>
      <input type="range" id="relSlider" min="0" max="3" step="0.01" value="0.3">
    </div>
  </div>

  <div id="kb-wrap" hidden>
    <div id="kb-center">
      <div id="piano"></div>
    </div>
  </div>

  <p id="tip">Hold a key to play · Drag to scan · Keyboard rows 1–= / Q–] / A–' / Z–/ · Shift to access upper range</p>

  <script>
  (() => {
    /* ── keyboard layout ── */
    const KEY_ORDER = [
      'Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9','Digit0','Minus','Equal',
      'KeyQ','KeyW','KeyE','KeyR','KeyT','KeyY','KeyU','KeyI','KeyO','KeyP','BracketLeft','BracketRight',
      'KeyA','KeyS','KeyD','KeyF','KeyG','KeyH','KeyJ','KeyK','KeyL','Semicolon','Quote',
      'KeyZ','KeyX','KeyC','KeyV','KeyB','KeyN','KeyM','Comma','Period','Slash'
    ];
    const KEY_LABELS = [
      '1','2','3','4','5','6','7','8','9','0','-','=',
      'Q','W','E','R','T','Y','U','I','O','P','[',']',
      'A','S','D','F','G','H','J','K','L',';',"'",
      'Z','X','C','V','B','N','M',',','.','/'
    ];
    const SHIFT_OFFSET = KEY_ORDER.length; // 45
    const keyMap = {};
    KEY_ORDER.forEach((code, i) => { keyMap[code] = i; });

    // semitone → black key?
    const IS_BLK = [0,1,0,1,0,0,1,0,1,0,1,0].map(Boolean);
    // white semitones: index within the 7 white keys of the octave
    const W_IDX  = [0,-1,1,-1,2,3,-1,4,-1,5,-1,6];
    // black semitones: centre position in white-key-width units within octave
    const B_OFF  = [0,.65,0,1.65,0,0,3.65,0,4.65,0,5.65,0];

    const WW = 42, WH = 164, BW = 26, BH = 102;

    /* state */
    let actx     = null;
    let buf      = null;
    let segN     = 24;
    const playing  = {};   // index → { src, gain }
    const touchMap = {};   // touch identifier → key index
    const kbPressed = {};  // e.code → segment index currently playing
    let mouseKey = null;
    let shiftHeld = false;
    const adsr = { a: 0.01, d: 0.10, s: 0.80, r: 0.30 };

    /* DOM */
    const fileEl   = document.getElementById('fileInput');
    const segEl    = document.getElementById('segInput');
    const btnEl    = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');
    const kbWrap   = document.getElementById('kb-wrap');
    const piano    = document.getElementById('piano');

    /* ── setup ── */
    fileEl.addEventListener('change', () => {
      btnEl.disabled = !fileEl.files.length;
      if (fileEl.files.length) setStatus(`"${fileEl.files[0].name}" selected.`);
    });

    btnEl.addEventListener('click', async () => {
      const file = fileEl.files[0];
      if (!file) return;

      const n = clamp(parseInt(segEl.value) || 24, 12, 84);
      segEl.value = n;

      btnEl.disabled = true;
      setStatus('Decoding audio…');

      try {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        buf  = await actx.decodeAudioData(await file.arrayBuffer());
        segN = n;
        stopAll();
        buildPiano(n);
        kbWrap.hidden = false;
        const seg = (buf.duration / n).toFixed(3);
        setStatus(`${n} keys · ${buf.duration.toFixed(2)} s total · ${seg} s per segment`);
      } catch (e) {
        setStatus(`Error: ${e.message}`);
      }

      btnEl.disabled = false;
    });

    /* ── piano builder ── */
    function buildPiano(n) {
      piano.innerHTML = '';
      mouseKey = null;
      Object.keys(touchMap).forEach(id => delete touchMap[id]);

      let wCount = 0;
      const whites = [], blacks = [];

      for (let k = 0; k < n; k++) {
        const note = k % 12, oct = Math.floor(k / 12);
        if (!IS_BLK[note]) {
          whites.push({ k, left: (oct * 7 + W_IDX[note]) * WW });
          wCount++;
        } else {
          blacks.push({ k, left: (oct * 7 + B_OFF[note]) * WW - BW / 2 });
        }
      }

      piano.style.width  = `${wCount * WW}px`;
      piano.style.height = `${WH}px`;

      const frag = document.createDocumentFragment();
      whites.forEach(({ k, left }) => frag.appendChild(mkKey('wk', k, left, WW - 1, WH)));
      blacks.forEach(({ k, left }) => frag.appendChild(mkKey('bk', k, left, BW, BH)));
      piano.appendChild(frag);
    }

    function mkKey(cls, index, left, w, h) {
      const el = document.createElement('div');
      el.className = `key ${cls}`;
      el.dataset.index = index;
      el.style.cssText = `left:${left}px;top:0;width:${w}px;height:${h}px;`;
      if (index < SHIFT_OFFSET * 2) {
        const lbl = document.createElement('span');
        lbl.className = 'key-label';
        lbl.textContent = index < SHIFT_OFFSET
          ? KEY_LABELS[index]
          : '⇧' + KEY_LABELS[index - SHIFT_OFFSET];
        el.appendChild(lbl);
      }
      return el;
    }

    /* ── audio ── */
    function playKey(i) {
      if (!buf || !actx) return;
      actx.resume();
      // Immediately cut any note already on this slot
      if (playing[i]) {
        try { playing[i].src.stop(); } catch (_) {}
        delete playing[i];
      }

      const gain = actx.createGain();
      const src  = actx.createBufferSource();
      src.buffer = buf;
      src.connect(gain);
      gain.connect(actx.destination);

      const now = actx.currentTime;
      gain.gain.setValueAtTime(0, now);
      if (adsr.a > 0) {
        gain.gain.linearRampToValueAtTime(1, now + adsr.a);
      } else {
        gain.gain.setValueAtTime(1, now);
      }
      if (adsr.d > 0) {
        gain.gain.linearRampToValueAtTime(adsr.s, now + adsr.a + adsr.d);
      } else {
        gain.gain.setValueAtTime(adsr.s, now + adsr.a);
      }

      src.start(0, i * buf.duration / segN);
      playing[i] = { src, gain };
    }

    function stopKey(i) {
      if (!playing[i]) return;
      const { src, gain } = playing[i];
      delete playing[i];
      const now = actx.currentTime;
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(gain.gain.value, now);
      if (adsr.r > 0) {
        gain.gain.linearRampToValueAtTime(0, now + adsr.r);
        try { src.stop(now + adsr.r); } catch (_) {}
      } else {
        try { src.stop(); } catch (_) {}
      }
    }

    function stopAll() {
      Object.keys(playing).forEach(k => {
        try { playing[k].src.stop(); } catch (_) {}
        delete playing[k];
      });
    }

    /* ── key press/release ── */
    function pressKey(i) {
      piano.querySelector(`[data-index="${i}"]`)?.classList.add('active');
      playKey(i);
    }

    function releaseKey(i) {
      piano.querySelector(`[data-index="${i}"]`)?.classList.remove('active');
      stopKey(i);
    }

    function indexAt(el) {
      if (!el || !el.closest) return null;
      const k = el.closest('.key');
      return k ? parseInt(k.dataset.index, 10) : null;
    }

    /* ── mouse ── */
    piano.addEventListener('mousedown', e => {
      if (e.button !== 0 || !buf) return;
      e.preventDefault();
      const i = indexAt(e.target);
      if (i == null) return;
      mouseKey = i;
      pressKey(i);
    });

    document.addEventListener('mousemove', e => {
      if (mouseKey === null) return;
      const i = indexAt(document.elementFromPoint(e.clientX, e.clientY));
      if (i != null && i !== mouseKey) {
        releaseKey(mouseKey);
        mouseKey = i;
        pressKey(i);
      }
    });

    document.addEventListener('mouseup', () => {
      if (mouseKey !== null) { releaseKey(mouseKey); mouseKey = null; }
    });

    /* ── touch ── */
    piano.addEventListener('touchstart', e => {
      if (!buf) return;
      e.preventDefault();
      for (const t of e.changedTouches) {
        const i = indexAt(document.elementFromPoint(t.clientX, t.clientY));
        if (i != null) { touchMap[t.identifier] = i; pressKey(i); }
      }
    }, { passive: false });

    piano.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const i   = indexAt(document.elementFromPoint(t.clientX, t.clientY));
        const was = touchMap[t.identifier];
        if (i !== was) {
          if (was !== undefined) releaseKey(was);
          if (i != null) { touchMap[t.identifier] = i; pressKey(i); }
          else delete touchMap[t.identifier];
        }
      }
    }, { passive: false });

    const touchEnd = e => {
      for (const t of e.changedTouches) {
        const was = touchMap[t.identifier];
        if (was !== undefined) { releaseKey(was); delete touchMap[t.identifier]; }
      }
    };
    piano.addEventListener('touchend',    touchEnd);
    piano.addEventListener('touchcancel', touchEnd);

    /* ── keyboard ── */
    document.addEventListener('keydown', e => {
      if (!buf || document.activeElement.tagName === 'INPUT') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      if (e.key === 'Shift') {
        if (shiftHeld) return;
        shiftHeld = true;
        Object.entries(kbPressed).forEach(([code, oldIdx]) => {
          const newIdx = keyMap[code] + SHIFT_OFFSET;
          releaseKey(oldIdx);
          if (newIdx < segN) { kbPressed[code] = newIdx; pressKey(newIdx); }
          else { delete kbPressed[code]; }
        });
        return;
      }

      if (e.repeat) return;
      const base = keyMap[e.code];
      if (base === undefined) return;
      e.preventDefault();
      const idx = base + (shiftHeld ? SHIFT_OFFSET : 0);
      if (idx >= segN || kbPressed[e.code] !== undefined) return;
      kbPressed[e.code] = idx;
      pressKey(idx);
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'Shift') {
        if (!shiftHeld) return;
        shiftHeld = false;
        Object.entries(kbPressed).forEach(([code, oldIdx]) => {
          const newIdx = keyMap[code];
          releaseKey(oldIdx);
          if (newIdx < segN) { kbPressed[code] = newIdx; pressKey(newIdx); }
          else { delete kbPressed[code]; }
        });
        return;
      }
      if (kbPressed[e.code] !== undefined) {
        releaseKey(kbPressed[e.code]);
        delete kbPressed[e.code];
      }
    });

    /* ── ADSR sliders ── */
    [
      ['atkSlider', 'atkVal', 'a', v => v.toFixed(2) + 's'],
      ['decSlider', 'decVal', 'd', v => v.toFixed(2) + 's'],
      ['susSlider', 'susVal', 's', v => v.toFixed(2)],
      ['relSlider', 'relVal', 'r', v => v.toFixed(2) + 's'],
    ].forEach(([sliderId, valId, key, fmt]) => {
      const slider = document.getElementById(sliderId);
      const valEl  = document.getElementById(valId);
      slider.addEventListener('input', () => {
        adsr[key] = parseFloat(slider.value);
        valEl.textContent = fmt(adsr[key]);
      });
    });

    /* ── helpers ── */
    function setStatus(msg) { statusEl.textContent = msg; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  })();
  </script>
</body>
</html>
