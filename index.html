<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segment Sampler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 36px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #a78bfa;
    }

    .panel {
      background: #161625;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .field label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      width: 100px;
      flex-shrink: 0;
    }

    input[type="file"] {
      flex: 1;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    input[type="number"] {
      width: 76px;
      padding: 7px 10px;
      background: #0d0d1a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 1rem;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124,58,237,.25);
    }

    .hint { font-size: 0.78rem; color: #475569; }

    #loadBtn {
      align-self: flex-end;
      padding: 10px 28px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .15s;
    }

    #loadBtn:hover:not(:disabled) { background: #6d28d9; }
    #loadBtn:disabled { background: #2d2d4e; color: #4b5563; cursor: not-allowed; }

    #status {
      font-size: 0.78rem;
      color: #475569;
      text-align: center;
      min-height: 16px;
    }

    /* Keyboard */
    #kb-wrap {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 12px;
    }

    #kb-center {
      display: flex;
      justify-content: center;
      min-width: max-content;
    }

    #piano {
      position: relative;
      display: inline-block;
    }

    .key {
      position: absolute;
      border-radius: 0 0 5px 5px;
      cursor: pointer;
      user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .wk {
      background: linear-gradient(to bottom, #e0e0e0, #fff 35%);
      border: 1px solid #999;
      border-top: none;
      z-index: 1;
    }

    .wk.active { background: linear-gradient(to bottom, #a78bfa, #ddd6fe); }

    .bk {
      background: linear-gradient(160deg, #2e2e2e 0%, #0a0a0a 65%);
      border: 1px solid #000;
      box-shadow: 2px 6px 10px rgba(0,0,0,.8), inset 0 -2px 3px rgba(255,255,255,.06);
      z-index: 2;
    }

    .bk.active {
      background: linear-gradient(160deg, #6d28d9 0%, #3b0764 65%);
      box-shadow: 1px 3px 6px rgba(0,0,0,.8);
    }

    #tip {
      font-size: 0.73rem;
      color: #334155;
      letter-spacing: .5px;
    }
  </style>
</head>
<body>

  <h1>Segment Sampler</h1>

  <div class="panel">
    <div class="field">
      <label>Audio file</label>
      <input type="file" id="fileInput" accept="audio/*">
    </div>
    <div class="field">
      <label>Segments</label>
      <input type="number" id="segInput" min="12" max="108" value="24" step="1">
      <span class="hint">keys &nbsp;(12 – 108)</span>
    </div>
    <button id="loadBtn" disabled>Load</button>
    <div id="status">Select an audio file to get started.</div>
  </div>

  <div id="kb-wrap" hidden>
    <div id="kb-center">
      <div id="piano"></div>
    </div>
  </div>

  <p id="tip">Hold a key to play · Drag across keys to scan segments</p>

  <script>
  (() => {
    // semitone → black key?
    const IS_BLK = [0,1,0,1,0,0,1,0,1,0,1,0].map(Boolean);
    // white semitones: index within the 7 white keys of the octave
    const W_IDX  = [0,-1,1,-1,2,3,-1,4,-1,5,-1,6];
    // black semitones: centre position in white-key-width units within octave
    const B_OFF  = [0,.65,0,1.65,0,0,3.65,0,4.65,0,5.65,0];

    const WW = 42, WH = 164, BW = 26, BH = 102;

    /* state */
    let actx     = null;
    let buf      = null;
    let segN     = 24;
    const playing  = {};   // index → BufferSourceNode
    const touchMap = {};   // touch identifier → key index
    let mouseKey = null;

    /* DOM */
    const fileEl   = document.getElementById('fileInput');
    const segEl    = document.getElementById('segInput');
    const btnEl    = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');
    const kbWrap   = document.getElementById('kb-wrap');
    const piano    = document.getElementById('piano');

    /* ── setup ── */
    fileEl.addEventListener('change', () => {
      btnEl.disabled = !fileEl.files.length;
      if (fileEl.files.length) setStatus(`"${fileEl.files[0].name}" selected.`);
    });

    btnEl.addEventListener('click', async () => {
      const file = fileEl.files[0];
      if (!file) return;

      const n = clamp(parseInt(segEl.value) || 24, 12, 108);
      segEl.value = n;

      btnEl.disabled = true;
      setStatus('Decoding audio…');

      try {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        buf  = await actx.decodeAudioData(await file.arrayBuffer());
        segN = n;
        stopAll();
        buildPiano(n);
        kbWrap.hidden = false;
        const seg = (buf.duration / n).toFixed(3);
        setStatus(`${n} keys · ${buf.duration.toFixed(2)} s total · ${seg} s per segment`);
      } catch (e) {
        setStatus(`Error: ${e.message}`);
      }

      btnEl.disabled = false;
    });

    /* ── piano builder ── */
    function buildPiano(n) {
      piano.innerHTML = '';
      mouseKey = null;
      Object.keys(touchMap).forEach(id => delete touchMap[id]);

      let wCount = 0;
      const whites = [], blacks = [];

      for (let k = 0; k < n; k++) {
        const note = k % 12, oct = Math.floor(k / 12);
        if (!IS_BLK[note]) {
          whites.push({ k, left: (oct * 7 + W_IDX[note]) * WW });
          wCount++;
        } else {
          blacks.push({ k, left: (oct * 7 + B_OFF[note]) * WW - BW / 2 });
        }
      }

      piano.style.width  = `${wCount * WW}px`;
      piano.style.height = `${WH}px`;

      const frag = document.createDocumentFragment();
      whites.forEach(({ k, left }) => frag.appendChild(mkKey('wk', k, left, WW - 1, WH)));
      blacks.forEach(({ k, left }) => frag.appendChild(mkKey('bk', k, left, BW, BH)));
      piano.appendChild(frag);
    }

    function mkKey(cls, index, left, w, h) {
      const el = document.createElement('div');
      el.className = `key ${cls}`;
      el.dataset.index = index;
      el.style.cssText = `left:${left}px;top:0;width:${w}px;height:${h}px;`;
      return el;
    }

    /* ── audio ── */
    function playKey(i) {
      if (!buf || !actx) return;
      actx.resume();
      stopKey(i);
      const src = actx.createBufferSource();
      src.buffer = buf;
      src.connect(actx.destination);
      src.start(0, i * buf.duration / segN);
      playing[i] = src;
    }

    function stopKey(i) {
      if (playing[i]) {
        try { playing[i].stop(); } catch (_) {}
        delete playing[i];
      }
    }

    function stopAll() {
      Object.keys(playing).forEach(k => stopKey(Number(k)));
    }

    /* ── key press/release ── */
    function pressKey(i) {
      piano.querySelector(`[data-index="${i}"]`)?.classList.add('active');
      playKey(i);
    }

    function releaseKey(i) {
      piano.querySelector(`[data-index="${i}"]`)?.classList.remove('active');
      stopKey(i);
    }

    function indexAt(el) {
      if (!el || !el.closest) return null;
      const k = el.closest('.key');
      return k ? parseInt(k.dataset.index, 10) : null;
    }

    /* ── mouse ── */
    piano.addEventListener('mousedown', e => {
      if (e.button !== 0 || !buf) return;
      e.preventDefault();
      const i = indexAt(e.target);
      if (i == null) return;
      mouseKey = i;
      pressKey(i);
    });

    document.addEventListener('mousemove', e => {
      if (mouseKey === null) return;
      const i = indexAt(document.elementFromPoint(e.clientX, e.clientY));
      if (i != null && i !== mouseKey) {
        releaseKey(mouseKey);
        mouseKey = i;
        pressKey(i);
      }
    });

    document.addEventListener('mouseup', () => {
      if (mouseKey !== null) { releaseKey(mouseKey); mouseKey = null; }
    });

    /* ── touch ── */
    piano.addEventListener('touchstart', e => {
      if (!buf) return;
      e.preventDefault();
      for (const t of e.changedTouches) {
        const i = indexAt(document.elementFromPoint(t.clientX, t.clientY));
        if (i != null) { touchMap[t.identifier] = i; pressKey(i); }
      }
    }, { passive: false });

    piano.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const i   = indexAt(document.elementFromPoint(t.clientX, t.clientY));
        const was = touchMap[t.identifier];
        if (i !== was) {
          if (was !== undefined) releaseKey(was);
          if (i != null) { touchMap[t.identifier] = i; pressKey(i); }
          else delete touchMap[t.identifier];
        }
      }
    }, { passive: false });

    const touchEnd = e => {
      for (const t of e.changedTouches) {
        const was = touchMap[t.identifier];
        if (was !== undefined) { releaseKey(was); delete touchMap[t.identifier]; }
      }
    };
    piano.addEventListener('touchend',    touchEnd);
    piano.addEventListener('touchcancel', touchEnd);

    /* ── helpers ── */
    function setStatus(msg) { statusEl.textContent = msg; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  })();
  </script>
</body>
</html>
